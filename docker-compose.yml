services:
  db:
    image: postgres:16
    container_name: fraud_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  kafka:
    image: apache/kafka:3.9.0
    container_name: fraud_kafka
    restart: always
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      CLUSTER_ID: "fraud-kafka-cluster-001"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ml-fraud:latest
    container_name: fraud_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MODEL_PATH: ${MODEL_PATH}
      API_KEY: ${API_KEY}
      FRAUD_THRESHOLD: ${FRAUD_THRESHOLD}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./model:/app/model:ro
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  scorer:
    image: ml-fraud:latest
    container_name: fraud_scorer
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MODEL_PATH: ${MODEL_PATH}
      FRAUD_THRESHOLD: ${FRAUD_THRESHOLD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./model:/app/model:ro
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      api:
        condition: service_started
    command: python -m src.streaming.consumer
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  producer:
    image: ml-fraud:latest
    container_name: fraud_producer
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      api:
        condition: service_started
    command: python -m src.streaming.producer
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  postgres_data:
  kafka_data:
