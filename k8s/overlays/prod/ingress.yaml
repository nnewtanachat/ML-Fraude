# Ingress: เปิดให้ข้างนอกเข้า API ผ่าน HTTPS
# ถ้าไม่ต้องการให้ข้างนอกเข้า → ไม่ต้อง apply ไฟล์นี้
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fraud-api-ingress
  namespace: fraud-detection
  annotations:
    # Auto-provision SSL certificate
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # IP Whitelist (ใส่ IP ที่อนุญาตเท่านั้น ลบ annotation นี้ถ้าจะเปิด public)
    nginx.ingress.kubernetes.io/whitelist-source-range: "203.0.113.0/24,198.51.100.0/24"
    # Request size limit
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.fraud.example.com
      secretName: fraud-api-tls
  rules:
    - host: api.fraud.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fraud-api
                port:
                  number: 80
