# Let's Encrypt ClusterIssuer — สร้าง HTTPS cert ฟรีอัตโนมัติ
# ต้อง install cert-manager ก่อน:
# helm install cert-manager jetstack/cert-manager --namespace cert-manager --create-namespace --set crds.enabled=true
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: tanachat@hotmail.com   # ← เปลี่ยนเป็น email จริง (แจ้งเตือนตอน cert หมดอายุ)
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
