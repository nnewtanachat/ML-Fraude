apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pgadmin-ingress
  namespace: fraud-detection
spec:
  ingressClassName: nginx
  rules:
    - host: pgadmin.local  # ← เปลี่ยนเป็น domain จริง
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pgadmin
                port:
                  number: 80
