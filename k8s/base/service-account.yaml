# Service Accounts — identity ของแต่ละ service (least privilege)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fraud-api-sa
  namespace: fraud-detection
  labels:
    app.kubernetes.io/component: api
  annotations:
    # GCP: map กับ GCP Service Account (เปลี่ยนตอนใช้จริง)
    # iam.gke.io/gcp-service-account: fraud-api@PROJECT.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fraud-worker-sa
  namespace: fraud-detection
  labels:
    app.kubernetes.io/component: worker
  annotations:
    # GCP: map กับ GCP Service Account
    # iam.gke.io/gcp-service-account: fraud-worker@PROJECT.iam.gserviceaccount.com
