apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-scorer
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: fraud-scorer
    app.kubernetes.io/component: scorer
    app.kubernetes.io/part-of: fraud-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-scorer
  template:
    metadata:
      labels:
        app: fraud-scorer
    spec:
      serviceAccountName: fraud-worker-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fraud-scorer
          image: ml-fraud:v1
          imagePullPolicy: Never
          command: ["python", "-m", "src.streaming.consumer"]
          envFrom:
            - configMapRef:
                name: fraud-config
            - secretRef:
                name: fraud-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            exec:
              command: ["python", "-c", "import socket; socket.create_connection(('kafka.fraud-detection.svc', 9092), timeout=5)"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
