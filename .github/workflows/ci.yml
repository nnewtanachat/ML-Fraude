name: CI/CD — Full DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: asia-southeast1-docker.pkg.dev/YOUR_PROJECT/ml-fraud  # ← เปลี่ยน
  IMAGE_NAME: api
  CLUSTER_NAME: fraud-cluster        # ← เปลี่ยน
  CLUSTER_ZONE: asia-southeast1-a    # ← เปลี่ยน

jobs:
  # ===== 1. Lint & Format =====
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  # ===== 2. Unit Tests =====
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/test_schemas.py tests/test_preprocess.py -v

  # ===== 3. SAST (Static Application Security Testing) =====
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit — find security issues in code
        run: bandit -r src/ -ll --format json -o bandit-report.json || true

      - name: Bandit — fail on high severity
        run: bandit -r src/ -ll -ii

      - name: pip-audit — check dependencies for vulnerabilities
        run: pip-audit -r requirements.txt

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  # ===== 4. Build + Push + Scan Image =====
  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      full_image: ${{ steps.meta.outputs.full_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev

      - name: Generate image tag
        id: meta
        run: |
          TAG=$(git rev-parse --short HEAD)
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.full_image }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ===== 5. Deploy to GKE =====
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  # ← requires approval (ตั้งใน GitHub Settings)
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_ZONE }}

      - name: Deploy to GKE
        run: |
          IMAGE="${{ needs.build.outputs.full_image }}"
          echo "Deploying image: $IMAGE"

          kubectl set image deployment/fraud-api \
            fraud-api=$IMAGE -n fraud-detection

          kubectl set image deployment/fraud-producer \
            fraud-producer=$IMAGE -n fraud-detection

          kubectl set image deployment/fraud-scorer \
            fraud-scorer=$IMAGE -n fraud-detection

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fraud-api -n fraud-detection --timeout=120s

      - name: Smoke test — verify API is healthy
        run: |
          sleep 15
          kubectl run smoke-test --rm -it --restart=Never \
            --namespace fraud-detection \
            --image=curlimages/curl \
            -- curl -sf http://fraud-api/health | grep -q "ok"
          echo "Smoke test passed!"

      - name: Auto-rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back!"
          kubectl rollout undo deployment/fraud-api -n fraud-detection
          kubectl rollout undo deployment/fraud-producer -n fraud-detection
          kubectl rollout undo deployment/fraud-scorer -n fraud-detection
          kubectl rollout status deployment/fraud-api -n fraud-detection --timeout=60s
          echo "Rollback completed"
