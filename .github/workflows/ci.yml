name: CI

# ทำงานเมื่อ push หรือเปิด PR เข้า branch main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. ดึง code ลงมาในเครื่องของ GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ติดตั้ง Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. ติดตั้ง dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. รัน test (เริ่มจากตัวที่ไม่ต้องพึ่ง DB/model ก่อน)
      - name: Run tests
        run: pytest tests/test_schemas.py tests/test_preprocess.py -v
